<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Geoffrey Audouin — Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --blanc:#faf8f5;
  --creme:#f2ede6;
  --gris-clair:#e8e2d9;
  --texte:#1a1815;
  --texte-doux:#7a756e;
  --accent:#e07a45;
  --serif:'DM Serif Display', serif;
  --sans:'DM Sans', sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--sans);background:var(--blanc);color:var(--texte);}

/* HEADER */
header{
  position:sticky;
  top:0;
  background:var(--blanc);
  border-bottom:1px solid var(--gris-clair);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 64px;
  height:68px;
  z-index:1000;
}

.logo{font-family:var(--serif);font-size:20px;text-decoration:none;color:var(--texte);}

nav{display:flex;gap:36px;align-items:center;}
nav a{font-size:14px;color:var(--texte-doux);text-decoration:none;}
.btn-nav{background:var(--texte);color:white;padding:9px 22px;border-radius:100px;}

/* BURGER */
.burger{display:none;flex-direction:column;gap:5px;cursor:pointer;}
.burger span{width:24px;height:2px;background:var(--texte);}

/* MOBILE MENU */
.mobile-menu{
  position:fixed;
  top:0;
  right:-100%;
  width:100%;
  height:100vh;
  background:var(--blanc);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:32px;
  transition:0.3s;
  z-index:999;
}
.mobile-menu.active{right:0;}
.mobile-menu a{font-size:22px;color:var(--texte);text-decoration:none;}

/* HERO */
.hero{
  display:grid;
  grid-template-columns:1fr 1fr;
  min-height:calc(100vh - 68px);
}

.hero-left{
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:80px 64px;
}

h1{
  font-family:var(--serif);
  font-size:clamp(44px,5vw,68px);
}

.hero-desc{margin:20px 0;color:var(--texte-doux);}

.hero-right{background:var(--creme);}

/* STATS */
.stats-band{display:flex;border-top:1px solid var(--gris-clair);}
.stat{flex:1;padding:30px;border-right:1px solid var(--gris-clair);}

/* GRID */
.grid-reals{
  display:grid;
  grid-template-columns:repeat(12,1fr);
  gap:16px;
  padding:0 64px 80px;
}

.real-card{
  height:280px;
  background:#ddd;
  border-radius:20px;
}

.real-card:nth-child(1){
  grid-column:1/6;
  grid-row:1/3;
  height:auto;
}

/* APROPOS */
.apropos{
  display:grid;
  grid-template-columns:1fr 1fr;
  background:var(--creme);
}

.apropos-left,.apropos-right{padding:80px 64px;}

/* CONTACT */
.contact{padding:100px 64px;text-align:center;}

.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

.form-contact input,
.form-contact textarea{
  width:100%;
  padding:16px;
  border-radius:12px;
  border:1px solid var(--gris-clair);
  background:var(--creme);
}

/* FOOTER */
footer{
  background:var(--texte);
  color:white;
  padding:40px 64px;
  display:flex;
  justify-content:space-between;
}

/* ===================== */
/* ===== RESPONSIVE ==== */
/* ===================== */

@media (max-width:1024px){

  header{padding:0 24px;}

  nav{display:none;}
  .burger{display:flex;}

  .hero{grid-template-columns:1fr;}
  .hero-left{padding:60px 24px;}
  .hero-right{height:300px;}

  .stats-band{flex-direction:column;}
  .stat{border-right:none;border-bottom:1px solid var(--gris-clair);}

  .grid-reals{
    grid-template-columns:1fr 1fr;
    padding:0 24px 60px;
  }

  .real-card{
    grid-column:auto!important;
    grid-row:auto!important;
    height:220px;
  }

  .apropos{grid-template-columns:1fr;}
  .apropos-left,.apropos-right{padding:60px 24px;}

  .contact{padding:80px 24px;}

  .form-row-2{grid-template-columns:1fr;}

  footer{flex-direction:column;gap:16px;text-align:center;}
}

@media (max-width:600px){

  h1{font-size:36px;}

  .grid-reals{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<header>
  <a href="#" class="logo">Geoffrey Audouin</a>

  <nav>
    <a href="#realisations">Réalisations</a>
    <a href="#apropos">À propos</a>
    <a href="#">Galerie photo</a>
    <a href="#contact" class="btn-nav">Me contacter</a>
  </nav>

  <div class="burger" onclick="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
  </div>
</header>

<div class="mobile-menu" id="mobileMenu">
  <a href="#realisations">Réalisations</a>
  <a href="#apropos">À propos</a>
  <a href="#">Galerie photo</a>
  <a href="#contact">Contact</a>
</div>

<section class="hero">
  <div class="hero-left">
    <h1>Photos,<br>création,<br><em>impact.</em></h1>
    <p class="hero-desc">Photographe de voyage, portrait et événementiel.</p>
  </div>
  <div class="hero-right"></div>
</section>

<div class="stats-band">
  <div class="stat">+4 ans</div>
  <div class="stat">Bac+5</div>
  <div class="stat">Photo / Vidéo</div>
  <div class="stat">La Rochelle</div>
</div>

<div id="realisations">
  <div class="grid-reals">
    <div class="real-card"></div>
    <div class="real-card"></div>
    <div class="real-card"></div>
    <div class="real-card"></div>
    <div class="real-card"></div>
  </div>
</div>

<section class="apropos" id="apropos">
  <div class="apropos-left">Photo</div>
  <div class="apropos-right">Texte à propos</div>
</section>

<section class="contact" id="contact">
  <h2>Contact</h2>
  <form class="form-contact">
    <div class="form-row-2">
      <input placeholder="Nom">
      <input placeholder="Prénom">
    </div>
    <div class="form-row-2">
      <input placeholder="Email">
      <input placeholder="Objet">
    </div>
    <textarea placeholder="Message"></textarea>
  </form>
</section>

<footer>
  <span>Geoffrey Audouin</span>
  <p>© 2025</p>
</footer>

<script>
function toggleMenu(){
  document.getElementById("mobileMenu").classList.toggle("active");
}
</script>

</body>
</html>
